# IOT自动化测试配置文件

## 登录信息
[LOGIN]
URL = https://iot.csmart-test.com/#/login
USERNAME = raolekang
PASSWORD = Aa123456.
REMEMBER_ME = true
CAPTCHA_WAIT_TIME = 15  # 等待验证码输入的时间（秒）

## 浏览器配置
[BROWSER]
HEADLESS = false  # true: 后台运行，false: 显示浏览器窗口
WINDOW_WIDTH = 1920
WINDOW_HEIGHT = 1080
IMPLICIT_WAIT = 10  # 隐式等待时间（秒）
EXPLICIT_WAIT = 30  # 显式等待时间（秒）
PAGE_LOAD_TIMEOUT = 60  # 页面加载超时（秒）

## 测试配置
[TEST]
RUN_LOGIN_TEST = true  # TC_DS_001
RUN_FILTER_TEST = true  # TC_DS_002
RUN_EXPORT_TEST = true  # TC_DS_003
RUN_CHART_TEST = true  # TC_DS_004
SAVE_PAGE_SOURCE = true  # 保存页面源代码
SAVE_SCREENSHOTS = true  # 保存截图
VERBOSE_LOGGING = true  # 详细日志输出

## 系统筛选配置（TC_DS_002）
[FILTER]
DEFAULT_SYSTEM = C-Smart内部盘
TARGET_SYSTEM = 市场化盘
QUERY_BUTTON_TEXT = 查询
EXPECTED_RESULT = 暂无数据

## 导出配置（TC_DS_003）
[EXPORT]
EXPORT_BUTTON_TEXT = 导出
FORMAT = PDF
CONFIRM_BUTTON_TEXT = 确定

## 图表配置（TC_DS_004）
[CHART]
CHART_NAME = 4G手表
DETAIL_BUTTON_TEXT = 查看详情
EXPECTED_WINDOW = 设备详情

## 日志配置
[LOGGING]
LOG_DIR = ./logs
SAVE_HTML_ON_ERROR = true  # 失败时保存HTML
SAVE_SCREENSHOTS_ON_ERROR = true  # 失败时保存截图
